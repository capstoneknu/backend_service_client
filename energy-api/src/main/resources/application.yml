spring:
  application:
    name: energy-api

  # MySQL 설정
  datasource:
    url: jdbc:mysql://localhost:3306/energydb?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: energy
    password: energy1234

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false                # SQL 로그 끔 (시끄러움)
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.MySQLDialect

  h2:
    console:
      enabled: false

  # Kafka 설정
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: spring-backend-group
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

# JWT 설정
jwt:
  secret: energy-dashboard-capstone-jwt-secret-key-2024-must-be-at-least-256-bits-long
  expiration: 86400000

# 서버 포트
server:
  port: 8085

# ⭐ 로그 레벨 설정 (Kafka 시끄러운 로그 끄기)
logging:
  level:
    root: WARN                                # 전체 기본은 WARN (에러만)
    com.energy.api: INFO                      # 우리 코드는 INFO (⚡ 로그 보이게)
    org.apache.kafka: WARN                    # Kafka 클라이언트 로그 끔
    org.springframework.kafka: WARN           # Spring Kafka 로그 끔
    org.hibernate: WARN                       # Hibernate 로그 끔
    org.springframework.web: INFO             # Spring Web은 유지