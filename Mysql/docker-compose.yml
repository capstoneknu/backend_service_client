services:
  mysql:
    image: mysql:8.0
    container_name: energy-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: capstone2026
      MYSQL_DATABASE: energydb
      MYSQL_USER: energy
      MYSQL_PASSWORD: energy1234
      TZ: Asia/Seoul
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
    restart: unless-stopped

volumes:
  mysql-data:
